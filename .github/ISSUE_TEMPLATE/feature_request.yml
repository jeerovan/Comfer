name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please focus on the user problem first, then describe the feature you want.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Explain the need or frustration behind the request.
      placeholder: It is hard to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Describe the feature or behavior you want to see.
      placeholder: I would like Comfer to ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround or alternative you already tried.
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add mockups, examples, or anything else that helps explain the request.
